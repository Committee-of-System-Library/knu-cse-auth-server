name: CI/CD

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: committee-of-system-library
  IMAGE_NAME: sso-be

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        run: chmod +x ./gradlew && ./gradlew clean build -x test

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build \
            -t $REGISTRY/$ORG/$IMAGE_NAME:latest \
            -t $REGISTRY/$ORG/$IMAGE_NAME:$(date +%Y%m%d%H%M%S) \
            .
          docker push $REGISTRY/$ORG/$IMAGE_NAME --all-tags

  deploy:
    needs: build-and-push
    runs-on: [ 'self-hosted', 'backend' ]
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Pull and restart
        run: |
          docker pull $REGISTRY/$ORG/$IMAGE_NAME:latest
          docker compose -f /opt/docker/compose/docker-compose.services.yml up -d sso-be

      - name: Cleanup
        run: docker image prune -f
